<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In - The Company</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/signin.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">The Company</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="signin.html">Sign In</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [showCreate, setShowCreate] = useState(false);

      const [login, setLogin] = useState("");
      const [password, setPassword] = useState("");

      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [createLogin, setCreateLogin] = useState("");
      const [createPassword, setCreatePassword] = useState("");

      const [refresh, setRefresh] = useState(false);

      useEffect(() => {
        const savedLogin = localStorage.getItem("login");
        const savedPassword = localStorage.getItem("password");

        if (savedLogin) setLogin(savedLogin);
        if (savedPassword) setPassword(savedPassword);
      }, [refresh]);

      const handleSubmit = (e) => {
        e.preventDefault();
        localStorage.setItem("login", login);
        localStorage.setItem("password", password);
        setRefresh(!refresh);
      };

      const handleEnter = (e) => {
        e.preventDefault();
        localStorage.setItem("login", createLogin);
        localStorage.setItem("password", createPassword);
        setShowCreate(false);
        setRefresh(!refresh);
      };

      return (
        <div className="forms-container">
          <form className="vertical-form" onSubmit={handleSubmit}>
            <input
              type="text"
              placeholder="Login"
              value={login}
              onChange={(e) => setLogin(e.target.value)}
            />
            <input
              type="password"
              placeholder="Password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
            />
            <button type="submit">Submit</button>
            <button type="button" onClick={() => setShowCreate(true)}>Create Account</button>
          </form>

          {showCreate && (
            <form className="vertical-form" onSubmit={handleEnter}>
              <input
                type="text"
                placeholder="Name"
                value={name}
                onChange={(e) => setName(e.target.value)}
              />
              <input
                type="email"
                placeholder="Email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />
              <input
                type="text"
                placeholder="Login"
                value={createLogin}
                onChange={(e) => setCreateLogin(e.target.value)}
              />
              <input
                type="password"
                placeholder="Password"
                value={createPassword}
                onChange={(e) => setCreatePassword(e.target.value)}
              />
              <button type="submit">Enter</button>
            </form>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
